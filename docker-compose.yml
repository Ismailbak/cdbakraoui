version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql+pymysql://admin:changeme@db:3306/dentai
      - RAG_QDRANT_HOST=qdrant
      - RAG_SEMANTIC_ENABLED=false
    depends_on:
      - db
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  db:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=changeme
      - MYSQL_DATABASE=dentai
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=changeme
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"

  frontend-web:
    build: ./frontend/web
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
  qdrant_data:
